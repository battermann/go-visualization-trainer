      <circle cx="259" cy="222.5" r="17" fill="url(#white-stone)"/>
      <circle cx="259" cy="149.5" r="17" fill="url(#black-stone)"/>
      <circle cx="113" cy="149.5" r="17" fill="url(#white-stone)"/>
      <circle cx="222.5" cy="259" r="17" fill="url(#black-stone)"/>
      <circle cx="295.5" cy="149.5" r="17" fill="url(#white-stone)"/>
