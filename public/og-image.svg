<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121821"/>
      <stop offset="0.58" stop-color="#18212b"/>
      <stop offset="1" stop-color="#10151c"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e1b16f"/>
      <stop offset="0.5" stop-color="#d09f5f"/>
      <stop offset="1" stop-color="#c6904e"/>
    </linearGradient>
    <radialGradient id="wood-light" cx="24%" cy="18%" r="48%">
      <stop offset="0" stop-color="#f6d99c" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#f6d99c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="black-stone" cx="36%" cy="28%" r="70%">
      <stop offset="0" stop-color="#494949"/>
      <stop offset="0.22" stop-color="#151515"/>
      <stop offset="1" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="white-stone" cx="34%" cy="26%" r="72%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#f8f8f8"/>
      <stop offset="1" stop-color="#d6d6d6"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="stone-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#page)"/>
  <circle cx="184" cy="20" r="260" fill="#3f78b3" opacity="0.13"/>
  <circle cx="1040" cy="62" r="220" fill="#e0b06d" opacity="0.1"/>

  <text x="74" y="170" fill="#f3f6fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="0">
    Go Visualization
  </text>
  <text x="74" y="250" fill="#f3f6fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="0">
    Trainer
  </text>
  <text x="78" y="322" fill="#c9d3e2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="500">
    Study a Go position, hide it, then rebuild it
  </text>
  <text x="78" y="366" fill="#c9d3e2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="500">
