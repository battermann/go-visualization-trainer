      <line x1="40" y1="76.5" x2="332" y2="76.5"/>
      <line x1="40" y1="113" x2="332" y2="113"/>
      <line x1="40" y1="149.5" x2="332" y2="149.5"/>
      <line x1="40" y1="186" x2="332" y2="186"/>
